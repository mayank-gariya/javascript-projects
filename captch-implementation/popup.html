<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Registration Form Section -->
        <div id="formWrapper">
            <h2>Register</h2>
            <form id="registerForm">

                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <div class="captcha-box">
                    <div id="captchaText"></div>
                    <button type="button" id="refreshCaptcha" title="Refresh CAPTCHA">↻</button>
                </div>

                <div class="input-group">
                    <label for="captchaInput">Enter CAPTCHA</label>
                    <input type="text" id="captchaInput" placeholder="Type CAPTCHA" required>
                </div>

                <button type="submit" class="submit-btn">Register</button>

            </form>
        </div>

        <!-- Success Screen Section -->
        <div class="success-card hidden" id="successCard">
            <!-- Left Side: Success Message & Quote -->
            <div class="success-left">
                <div class="success-icon">🎉</div>
                <h2>Registration Successful</h2>
                <p class="welcome-text">Welcome, <span id="userName"></span></p>
                <div class="quote-box">
                    <h4>Today's Quote</h4>
                    <p id="quoteText">Loading...</p>
                </div>
                <button id="backButton">Register Another User</button>
            </div>

            <!-- Right Side: Registration Logs -->
            <div class="success-right">
                <h3>Registration Logs</h3>
                <div id="logsContainer" class="logs-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
